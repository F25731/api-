<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>后台配置 - 云逸解析</title>
  <style>
    :root {
      --bg-color: #0d0221;
      --primary-purple: #9d4edd;
      --neon-purple: #e0aaff;
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      --text-main: #f8f9fa;
      --text-muted: #adb5bd;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    .bg-glow {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      z-index: -1;
      opacity: 0.6;
    }
    .glow-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: #3c096c; }
    .glow-2 { bottom: -20%; right: -10%; width: 60vw; height: 60vw; background: #240046; }
    .glow-3 { top: 40%; left: 40%; width: 30vw; height: 30vw; background: #5a189a; }

    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      box-shadow: var(--glass-shadow);
    }

    .page-shell {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      margin-bottom: 40px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: var(--text-main);
    }
    .brand-mark {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      overflow: hidden;
    }
    .brand-mark img {
      width: 100%;
      height: 100%;
      display: block;
    }
    #siteNameBrand {
      font-size: 1.3rem;
      font-weight: 600;
      letter-spacing: 1px;
    }
    nav a {
      color: var(--text-muted);
      text-decoration: none;
      margin-left: 20px;
      font-weight: 500;
      transition: color 0.3s;
      background: rgba(255, 255, 255, 0.05);
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--glass-border);
    }
    nav a:hover, nav a.active { color: #fff; background: rgba(157, 78, 221, 0.2); border-color: var(--neon-purple); }

    button {
      font-family: inherit;
      cursor: pointer;
      outline: none;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    .primary-btn {
      background: linear-gradient(135deg, var(--primary-purple), #7b2cbf);
      color: #fff;
      padding: 12px 32px;
      font-size: 1.1rem;
      box-shadow: 0 4px 15px rgba(123, 44, 191, 0.4);
      white-space: nowrap;
    }
    .primary-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(123, 44, 191, 0.6); }
    .ghost-btn, .mini-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      color: var(--text-main);
      padding: 10px 20px;
      font-size: 0.95rem;
    }
    .ghost-btn:hover, .mini-btn:hover { background: rgba(255, 255, 255, 0.15); color: #fff; }

    input[type="text"], input[type="password"], input[type="number"] {
      width: 100%;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      padding: 12px 16px;
      color: #fff;
      font-family: inherit;
      outline: none;
      transition: border-color 0.3s;
      font-size: 1rem;
    }
    input:focus { border-color: var(--neon-purple); }

    .admin-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 30px;
      margin-bottom: 30px;
    }
    .admin-head .eyebrow { color: var(--neon-purple); font-size: 0.9rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px;}
    .admin-head h1 { font-size: 2rem; margin-bottom: 10px; font-weight: 700; }
    .admin-head p { color: var(--text-muted); font-size: 0.95rem; }

    .settings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
      margin-bottom: 30px;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 24px;
    }
    .field span { font-weight: 600; font-size: 1.05rem; color: var(--neon-purple); }

    .api-table { padding: 30px; }
    .table-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--glass-border);
      padding-bottom: 16px;
    }
    .table-toolbar h2 { font-size: 1.5rem; margin-bottom: 8px; color: var(--text-main); }
    .table-toolbar p { color: var(--text-muted); font-size: 0.95rem; }

    #apiRows { display: flex; flex-direction: column; gap: 16px; }
    #apiRows > div, .api-row {
      display: flex;
      gap: 12px;
      align-items: center;
      background: rgba(0, 0, 0, 0.2);
      padding: 16px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: background 0.3s;
    }
    #apiRows > div:hover { background: rgba(0, 0, 0, 0.4); }
    #apiRows input { flex: 1; min-width: 120px; }
    #apiRows button { padding: 8px 12px; font-size: 0.9rem; border-radius: 8px; }
    .order-badge {
      flex: 0 0 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      background: rgba(157, 78, 221, 0.2);
      color: var(--neon-purple);
      font-weight: 700;
    }
    .api-switch {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-muted);
      white-space: nowrap;
    }
    .api-switch input { width: 18px; height: 18px; }
    .row-actions { display: flex; gap: 8px; }
    .danger { color: #ffc2ce; border-color: rgba(255, 120, 150, 0.35); }

    .admin-status {
      margin-top: 20px;
      text-align: center;
      color: #a9ff68;
      font-weight: 500;
      min-height: 24px;
    }

    @media (max-width: 768px) {
      .topbar { flex-direction: column; align-items: flex-start; gap: 18px; }
      nav a { margin-left: 0; }
      .admin-head { flex-direction: column; text-align: left; gap: 24px; align-items: flex-start; }
      .admin-head button { width: 100%; }
      .table-toolbar { flex-direction: column; gap: 16px; align-items: flex-start; }
      #apiRows > div, .api-row { flex-wrap: wrap; }
      .row-actions { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="bg-glow glow-1"></div>
  <div class="bg-glow glow-2"></div>
  <div class="bg-glow glow-3"></div>

  <div class="page-shell">
    <header class="topbar glass-panel">
      <a class="brand" href="/">
        <span class="brand-mark"><img src="/yunyi-logo.svg" alt="云逸解析"></span>
        <strong id="siteNameBrand">云逸解析</strong>
      </a>
      <nav>
        <a class="nav-link" href="/">返回前台</a>
      </nav>
    </header>

    <main>
      <section class="admin-head glass-panel">
        <div>
          <p class="eyebrow">Admin Center</p>
          <h1>系统后台配置</h1>
          <p>配置全局密钥、接口地址及显示顺序。保存后前台将立即生效。</p>
        </div>
        <button id="saveBtn" class="primary-btn">保存全部配置</button>
      </section>

      <section class="settings-grid">
        <label class="field glass-panel">
          <span>站点名称</span>
          <input id="siteNameInput" type="text" maxlength="40" placeholder="例如：云逸解析">
        </label>
        <label class="field glass-panel">
          <span>全局 apikey</span>
          <input id="apikeyInput" type="password" placeholder="仅服务端可用，不在前台展示">
        </label>
        <label class="field glass-panel">
          <span>请求超时 (ms)</span>
          <input id="timeoutInput" type="number" min="5000" max="120000" step="1000" placeholder="例如：45000">
        </label>
      </section>

      <section class="api-table glass-panel">
        <div class="table-toolbar">
          <div>
            <h2>接口列表</h2>
            <p>通过上下移动决定前台卡片的展示顺序，支持修改与删除操作。</p>
          </div>
          <button id="addApiBtn" class="ghost-btn" type="button">＋ 新增接口</button>
        </div>
        <div id="apiRows" class="api-rows"></div>
      </section>

      <p id="adminStatus" class="admin-status"></p>
    </main>
  </div>

  <script src="/admin.js"></script>
</body>
</html>
